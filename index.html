<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tei Velocity Feed</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <a class="velocity-mark" aria-label="Tei home" href="#">
          <span class="mark-t">T</span><span class="mark-ei">EI</span>
        </a>
        <div class="match-strip" aria-label="Live match selector">
          <button class="match-pill active" type="button">
            <span>LIV</span><strong>1</strong><small>63:14</small><strong>1</strong><span>MCI</span>
          </button>
          <button class="match-pill" type="button">
            <span>ARS</span><strong>2</strong><small>78:02</small><strong>0</strong><span>CHE</span>
          </button>
          <button class="match-pill" type="button">
            <span>INT</span><strong>0</strong><small>HT</small><strong>0</strong><span>JUV</span>
          </button>
        </div>
        <button class="theme-toggle" type="button" aria-label="Toggle color mode">◐</button>
      </header>

      <main class="layout">
        <section class="feed-shell" aria-labelledby="feed-title">
          <div class="feed-head">
            <div>
              <p class="eyebrow">Trade the match</p>
              <h1 id="feed-title">Velocity Feed</h1>
            </div>
            <div class="live-chip"><span></span> 24 live markets</div>
          </div>
          <div class="hot-zone-rail" aria-hidden="true"></div>
          <div id="feed" class="feed" aria-live="polite"></div>
          <div id="sentinel" class="sentinel" aria-hidden="true"></div>
        </section>

        <aside class="desk-panel" aria-label="Market pulse">
          <div class="panel-section">
            <p class="eyebrow">Pulse</p>
            <h2>Market heat</h2>
            <div class="heat-meter"><span style="width: 72%"></span></div>
            <p class="panel-copy">Fastest moves are clustered around corners, next goal, and cards.</p>
          </div>
          <div class="panel-section compact-stats">
            <div><span>Volume</span><strong>₦8.4M</strong></div>
            <div><span>Spread</span><strong>4.2%</strong></div>
            <div><span>Latency</span><strong>42ms</strong></div>
          </div>
        </aside>
      </main>

      <div class="tray-backdrop" hidden></div>
      <aside class="trade-tray" aria-hidden="true" aria-label="Trade ticket">
        <div class="tray-grip"></div>
        <div class="tray-market">
          <p class="eyebrow" id="tray-side">YES</p>
          <h2 id="tray-question">NEXT GOAL?</h2>
          <span id="tray-match">LIV vs MCI · 63:14</span>
        </div>
        <div class="stake-row">
          <button type="button">₦500</button>
          <button type="button">₦1K</button>
          <button type="button">₦5K</button>
          <button type="button">MAX</button>
        </div>
        <label class="stake-input">
          <span>Stake</span>
          <input id="stake" value="2500" inputmode="numeric" />
        </label>
        <div class="quote-box">
          <span>Est. return</span>
          <strong id="tray-return">₦4,032</strong>
        </div>
        <button class="place-bet" id="place-bet" type="button">Place Bet</button>
      </aside>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
